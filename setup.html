<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard Setup — Generate Auth Config</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:640px;margin:60px auto;padding:0 24px;background:#f8fafc;color:#1e293b}
  h1{font-size:20px;font-weight:700;margin-bottom:4px}
  p.sub{color:#64748b;font-size:14px;margin-top:0}
  label{display:block;font-size:13px;font-weight:600;margin:16px 0 4px}
  input{width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px}
  button{margin-top:8px;padding:8px 18px;background:#1e3a5f;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
  button:hover{background:#2d5490}
  .user-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
  .user-row input{flex:1}
  .remove{background:#ef4444;padding:6px 12px;font-size:12px;margin-top:0}
  #output{margin-top:24px;background:#0f172a;color:#e2e8f0;padding:16px;border-radius:8px;font-size:12px;font-family:monospace;white-space:pre-wrap;display:none}
  .copy-btn{background:#166534;margin-top:8px}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:20px;margin-bottom:16px}
  .step{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
</style>
</head>
<body>
<h1>Dashboard Auth Setup</h1>
<p class="sub">Run this once to generate encrypted credentials. Paste the output into <code>github-connector.js</code>.</p>

<div class="card">
  <div class="step">Step 1 — GitHub PAT</div>
  <label>Your GitHub Personal Access Token</label>
  <input type="password" id="pat" placeholder="ghp_...">
</div>

<div class="card">
  <div class="step">Step 2 — Add Users</div>
  <p style="font-size:13px;color:#64748b;margin-top:0">Each user gets their own password. They'll use it to log in.</p>
  <div id="users">
    <div class="user-row">
      <input placeholder="Username (e.g. patricia)" class="uname">
      <input type="password" placeholder="Password" class="upass">
    </div>
  </div>
  <button onclick="addUser()" style="background:#475569;margin-top:4px">+ Add another user</button>
</div>

<button onclick="generate()">Generate Config</button>

<div id="output"></div>
<button class="copy-btn" id="copy-btn" onclick="copyOutput()" style="display:none">Copy to clipboard</button>

<script>
function addUser() {
  const row = document.createElement('div');
  row.className = 'user-row';
  row.innerHTML = '<input placeholder="Username" class="uname"><input type="password" placeholder="Password" class="upass"><button class="remove" onclick="this.parentElement.remove()">✕</button>';
  document.getElementById('users').appendChild(row);
}

async function encryptPAT(pat, password) {
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMat, { name: 'AES-GCM', length: 256 }, false, ['encrypt']
  );
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(pat));
  const combined = new Uint8Array(16 + 12 + ct.byteLength);
  combined.set(salt, 0); combined.set(iv, 16); combined.set(new Uint8Array(ct), 28);
  return btoa(String.fromCharCode(...combined));
}

async function generate() {
  const pat = document.getElementById('pat').value.trim();
  if (!pat) { alert('Please enter your GitHub PAT'); return; }
  const rows = document.querySelectorAll('.user-row');
  const users = [];
  for (const row of rows) {
    const u = row.querySelector('.uname').value.trim();
    const p = row.querySelector('.upass').value;
    if (!u || !p) { alert('Fill in all username and password fields'); return; }
    const enc = await encryptPAT(pat, p);
    users.push({ username: u, encryptedPAT: enc });
  }
  if (!users.length) { alert('Add at least one user'); return; }

  const snippet = `// ─── AUTH_CONFIG — generated by setup.html ───────────────────────────────────
// To add/change users, run setup.html again and paste the new output here.
const AUTH_CONFIG = ${JSON.stringify({ users }, null, 2)};`;

  const out = document.getElementById('output');
  out.textContent = snippet;
  out.style.display = 'block';
  document.getElementById('copy-btn').style.display = 'inline-block';
  window._snippet = snippet;
}

function copyOutput() {
  navigator.clipboard.writeText(window._snippet || '');
  document.getElementById('copy-btn').textContent = 'Copied!';
  setTimeout(() => document.getElementById('copy-btn').textContent = 'Copy to clipboard', 2000);
}
</script>
</body>
</html>
